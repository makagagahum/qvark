<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Qorx active token surface chart</title>
  <desc id="desc">Log-scale horizontal bar chart showing indexed tokens versus visible or used tokens across Qorx routes.</desc>
  <rect width="1200" height="560" rx="24" fill="#FFFFFF"/>
  <text x="56" y="72" fill="#161C24" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Active Token Surface</text>
  <text x="56" y="108" fill="#667085" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="400">Log-scale view. Smaller active token surfaces mean less billable prompt context.</text>
  <line x1="260" y1="150" x2="260" y2="452" stroke="#D0D5DD" stroke-width="2"/>
  <line x1="260" y1="452" x2="1108" y2="452" stroke="#D0D5DD" stroke-width="2"/>
  <text x="56" y="205" fill="#161C24" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">Indexed baseline</text>
  <rect x="260" y="174" width="760" height="44" rx="12" fill="#E4E7EC"/>
  <text x="1048" y="203" text-anchor="end" fill="#161C24" font-family="SFMono-Regular, Consolas, monospace" font-size="22" font-weight="700">1,125</text>
  <text x="56" y="285" fill="#161C24" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">Bench average</text>
  <rect x="260" y="254" width="669" height="44" rx="12" fill="#FD7E14"/>
  <text x="955" y="283" text-anchor="end" fill="#161C24" font-family="SFMono-Regular, Consolas, monospace" font-size="22" font-weight="700">489</text>
  <text x="56" y="365" fill="#161C24" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">Squeeze used</text>
  <rect x="260" y="334" width="646" height="44" rx="12" fill="#0DCAF0"/>
  <text x="932" y="363" text-anchor="end" fill="#161C24" font-family="SFMono-Regular, Consolas, monospace" font-size="22" font-weight="700">391</text>
  <text x="56" y="445" fill="#161C24" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">Session visible</text>
  <rect x="260" y="414" width="288" height="44" rx="12" fill="#6F42C1"/>
  <text x="574" y="443" text-anchor="end" fill="#161C24" font-family="SFMono-Regular, Consolas, monospace" font-size="22" font-weight="700">69</text>
  <text x="260" y="510" fill="#667085" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="400">Source: docs/benchmarks/2026-05-01-benchmark-lab.json</text>
